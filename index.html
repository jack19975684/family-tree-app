<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>專業家系圖繪圖系統</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { --sidebar-width: 300px; --primary-color: #34495e; }
        body { font-family: "Microsoft JhengHei", sans-serif; margin: 0; display: flex; height: 100vh; background-color: #ecf0f1; }
        
        /* 側邊圖形列表 */
        .sidebar { width: var(--sidebar-width); background: white; border-right: 2px solid #bdc3c7; display: flex; flex-direction: column; box-shadow: 2px 0 5px rgba(0,0,0,0.1); }
        .sidebar-header { padding: 15px; background: var(--primary-color); color: white; font-weight: bold; text-align: center; }
        .tool-group { padding: 15px; border-bottom: 1px solid #eee; }
        .tool-group-title { font-size: 14px; color: #7f8c8d; margin-bottom: 10px; font-weight: bold; border-left: 4px solid #3498db; padding-left: 8px; }
        
        /* 圖形按鈕樣式 */
        .symbol-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .symbol-item { 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 10px; border: 1px solid #ddd; border-radius: 8px; cursor: pointer; transition: 0.2s; background: #fff;
        }
        .symbol-item:hover { background: #f1f8ff; border-color: #3498db; }
        .symbol-icon { font-size: 24px; margin-bottom: 5px; }
        .symbol-label { font-size: 12px; color: #34495e; }

        /* 畫布區域 */
        .canvas-area { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; position: relative; }
        #canvas-wrapper { background: white; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: 1px solid #ccc; }
        
        .action-bar { margin-top: 15px; }
        .btn-save { background: #27ae60; color: white; border: none; padding: 12px 30px; border-radius: 25px; font-size: 16px; cursor: pointer; font-weight: bold; }
        .btn-save:hover { background: #219150; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-header">家系圖符號面板</div>
        
        <div class="tool-group">
            <span class="tool-group-title">1. 設定標籤 (姓名/歲數)</span>
            <input type="text" id="nodeLabel" placeholder="例如：案男 45" style="width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #bdc3c7; border-radius: 4px;">
        </div>

        <div class="tool-group">
            <span class="tool-group-title">2. 選擇成員符號</span>
            <div class="symbol-grid">
                <div class="symbol-item" onclick="addNode('male')">
                    <div class="symbol-icon">□</div>
                    <div class="symbol-label">男 </div>
                </div>
                <div class="symbol-item" onclick="addNode('female')">
                    <div class="symbol-icon">○</div>
                    <div class="symbol-label">女 </div>
                </div>
                <div class="symbol-item" onclick="addNode('propositus_m')">
                    <div class="symbol-icon" style="border: 2px solid black; width: 20px; height: 20px; display: inline-block;"></div>
                    <div class="symbol-label">案男 </div>
                </div>
                <div class="symbol-item" onclick="addNode('propositus_f')">
                    <div class="symbol-icon" style="border: 2px solid black; border-radius: 50%; width: 20px; height: 20px; display: inline-block;"></div>
                    <div class="symbol-label">案女 </div>
                </div>
                <div class="symbol-item" onclick="addNode('dead_m')">
                    <div class="symbol-icon">☒</div>
                    <div class="symbol-label">亡男 </div>
                </div>
                <div class="symbol-item" onclick="addNode('dead_f')">
                    <div class="symbol-icon">ⓧ</div>
                    <div class="symbol-label">亡女 </div>
                </div>
            </div>
        </div>

        <div class="tool-group">
            <span class="tool-group-title">3. 建立關係 (選取兩人)</span>
            <div class="symbol-grid">
                <button onclick="createLink('normal')">── 連結 </button>
                <button onclick="createLink('cohabit')">╌╌ 同居 </button>
                <button onclick="createLink('divorce')">─/─ 離婚 </button>
                <button onclick="createLink('conflict')">⚡ 衝突 </button>
            </div>
        </div>

        <div style="padding: 20px; font-size: 12px; color: #95a5a6;">
            提示：選中後按 <b>Delete</b> 鍵刪除。<br>按住 <b>Shift</b> 點擊可多選。
        </div>
    </div>

    <div class="canvas-area">
        <div id="canvas-wrapper">
            <canvas id="mainCanvas" width="850" height="600"></canvas>
        </div>
        <div class="action-bar">
            <button class="btn-save" onclick="downloadImage()">💾 下載家系圖 (JPG)</button>
        </div>
    </div>

    <script>
        const canvas = new fabric.Canvas('mainCanvas');

        // 監聽鍵盤刪除
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Delete' || e.key === 'Backspace') {
                const active = canvas.getActiveObjects();
                active.forEach(obj => {
                    if (obj.attachedLines) obj.attachedLines.forEach(l => canvas.remove(l));
                    canvas.remove(obj);
                });
                canvas.discardActiveObject().requestRenderAll();
            }
        });

        // 加入成員圖形
        function addNode(type) {
            const labelText = document.getElementById('nodeLabel').value || "";
            let shape;
            const common = { originX: 'center', originY: 'center', fill: 'white', stroke: 'black', strokeWidth: 2 };

            if (type.includes('male')) {
                shape = new fabric.Rect({ ...common, width: 50, height: 50 });
            } else if (type.includes('female')) {
                shape = new fabric.Circle({ ...common, radius: 25 });
            }

            // 針對「案主」加粗框線 
            if (type.includes('propositus')) shape.set('strokeWidth', 5);

            // 針對「死亡」畫 X 
            let xLine;
            if (type.includes('dead')) {
                const textX = new fabric.Text('X', { fontSize: 40, originX: 'center', originY: 'center', top: 0, left: 0 });
                shape = new fabric.Group([shape, textX]);
            }

            const text = new fabric.Text(labelText, { fontSize: 14, top: 40, originX: 'center' });
            const group = new fabric.Group([shape, text], { left: 100, top: 100 });
            group.attachedLines = [];
            canvas.add(group);
        }

        // 建立連線並自動跟隨
        function createLink(style) {
            const selected = canvas.getActiveObjects();
            if (selected.length !== 2) return alert("請選取兩個人物 ");

            const p1 = selected[0], p2 = selected[1];
            const line = new fabric.Line([p1.left, p1.top, p2.left, p2.top], {
                stroke: 'black', strokeWidth: 2, selectable: true
            });

            if (style === 'cohabit') line.set('strokeDashArray', [5, 5]); [cite: 1]
            if (style === 'divorce') line.set('stroke', 'red'); [cite: 1]
            if (style === 'conflict') line.set('strokeDashArray', [2, 2]); [cite: 1]

            line.nodeA = p1; line.nodeB = p2;
            p1.attachedLines.push(line); p2.attachedLines.push(line);
            
            canvas.add(line);
            canvas.sendToBack(line);
        }

        // 移動時更新連線
        canvas.on('object:moving', (e) => {
            const p = e.target;
            if (p.attachedLines) {
                p.attachedLines.forEach(line => {
                    line.set({ x1: line.nodeA.left, y1: line.nodeA.top, x2: line.nodeB.left, y2: line.nodeB.top });
                });
            }
        });

        function downloadImage() {
            html2canvas(document.getElementById('canvas-wrapper')).then(c => {
                const a = document.createElement('a');
                a.href = c.toDataURL('image/jpeg', 0.9);
                a.download = 'family-tree.jpg';
                a.click();
            });
        }
    </script>
</body>
</html>
