<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>專業家系圖系統 - 高階對齊與生活圈版</title>
    <script src="https://unpkg.com/fabric@5.3.0/dist/fabric.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { --sidebar-bg: #2c3e50; --main-bg: #f4f7f6; }
        body { font-family: "Microsoft JhengHei", sans-serif; margin: 0; display: flex; height: 100vh; background: var(--main-bg); overflow: hidden; }
        .sidebar { width: 300px; background: var(--sidebar-bg); color: white; padding: 15px; overflow-y: auto; box-shadow: 2px 0 10px rgba(0,0,0,0.2); }
        .sidebar-header { text-align: center; font-weight: bold; border-bottom: 2px solid #34495e; padding-bottom: 10px; margin-bottom: 15px; }
        .section-title { font-size: 14px; color: #3498db; font-weight: bold; margin: 15px 0 10px; display: block; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .btn { background: #34495e; border: 1px solid #455a64; color: white; padding: 10px; cursor: pointer; border-radius: 6px; font-size: 12px; transition: 0.2s; }
        .btn:hover { background: #1abc9c; }
        input { width: 100%; padding: 10px; margin-bottom: 10px; border-radius: 4px; border: none; box-sizing: border-box; }
        .main-content { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        #canvas-holder { background: white; border: 2px solid #bdc3c7; box-shadow: 0 10px 25px rgba(0,0,0,0.1); position: relative; }
        .save-btn { background: #27ae60; color: white; padding: 12px 30px; border: none; border-radius: 30px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 20px; }
        
        /* 智慧箭頭樣式 */
        #quick-menu { position: absolute; display: none; pointer-events: none; z-index: 100; }
        .arrow-btn { 
            position: absolute; width: 32px; height: 32px; background: #e74c3c; color: white; 
            border-radius: 50%; display: flex; align-items: center; justify-content: center; 
            cursor: pointer; pointer-events: auto; font-weight: bold; font-size: 18px; border: 2px solid white; box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="sidebar-header">🧬 專業家系圖工具箱</div>
    <input type="text" id="nodeLabel" placeholder="輸入姓名/歲數/備註">
    
    <span class="section-title">1. 成員符號 (顏色填滿)</span>
    <div class="grid">
        <button class="btn" onclick="addNode('male')">□ 男性</button>
        <button class="btn" onclick="addNode('female')">○ 女性</button>
        <button class="btn" onclick="addNode('pro_male')">▣ 案男 (雙框)</button>
        <button class="btn" onclick="addNode('pro_female')">◉ 案女 (雙框)</button>
        <button class="btn" onclick="addNode('dead_male')">☒ 亡男</button>
        <button class="btn" onclick="addNode('dead_female')">ⓧ 亡女</button>
        <button class="btn" onclick="addNode('disability')">▩ 身障/病</button>
        <button class="btn" onclick="addNode('unknown')">△ 不確定</button>
    </div>

    <span class="section-title">2. 專業功能</span>
    <div class="grid">
        <button class="btn" onclick="addLifeCircle()" style="background:#8e44ad; grid-column: span 2;">⬢ 建立生活圈 (可拉扯支點)</button>
        <button class="btn" onclick="addNote()" style="background:#d35400; grid-column: span 2;">📝 新增說明文字</button>
    </div>

    <span class="section-title">3. 關係線 (自動置中)</span>
    <div class="grid">
        <button class="btn" onclick="manualLink('normal')">連結</button>
        <button class="btn" onclick="manualLink('cohabit')">同居</button>
        <button class="btn" onclick="manualLink('divorce')" style="color:#e74c3c">離婚</button>
        <button class="btn" onclick="manualLink('conflict')" style="color:#f1c40f">衝突</button>
        <button class="btn" onclick="manualLink('close')" style="color:#3498db">親密</button>
    </div>
</div>

<div class="main-content">
    <div id="canvas-holder">
        <canvas id="c" width="900" height="650"></canvas>
        <div id="quick-menu">
            <div class="arrow-btn" style="top: -45px; left: 50%; transform: translateX(-50%);" title="新增父母" onclick="quickAdd('up')">↑</div>
            <div class="arrow-btn" style="bottom: -45px; left: 50%; transform: translateX(-50%);" title="新增子女" onclick="quickAdd('down')">↓</div>
            <div class="arrow-btn" style="left: -45px; top: 50%; transform: translateY(-50%);" title="新增伴侶" onclick="quickAdd('left')">←</div>
            <div class="arrow-btn" style="right: -45px; top: 50%; transform: translateY(-50%);" title="新增手足" onclick="quickAdd('right')">→</div>
        </div>
    </div>
    <button class="save-btn" onclick="exportToJPG()">💾 下載家系圖 (JPG)</button>
</div>

<script>
    let canvas = new fabric.Canvas('c', { preserveObjectStacking: true });
    let selectedMember = null;

    // --- 核心功能：生活圈 (六角形支點變形) ---
    function addLifeCircle() {
        // 定義六角形的六個初始支點
        const points = [
            {x: 0, y: -90}, {x: 80, y: -45}, {x: 80, y: 45},
            {x: 0, y: 90}, {x: -80, y: 45}, {x: -80, y: -45}
        ];
        const polygon = new fabric.Polygon(points, {
            left: 300, top: 300, fill: 'rgba(142, 68, 173, 0.08)',
            stroke: '#8e44ad', strokeWidth: 2, strokeDashArray: [6, 4],
            objectCaching: false, transparentCorners: false,
            cornerColor: '#8e44ad', cornerSize: 8
        });
        canvas.add(polygon);
        canvas.setActiveObject(polygon);
    }

    // --- 核心功能：文字說明框 ---
    function addNote() {
        const textValue = document.getElementById('nodeLabel').value || "請輸入說明";
        const note = new fabric.IText(textValue, {
            left: 450, top: 325, fontSize: 16, backgroundColor: '#fff9c4',
            padding: 8, borderDashArray: [4, 4], stroke: '#f39c12',
            originX: 'center', originY: 'center'
        });
        canvas.add(note);
    }

    // --- 成員生成邏輯 (案主雙框/顏色填滿) ---
    function createNode(type, labelText, x, y) {
        const style = { originX: 'center', originY: 'center', stroke: 'black', strokeWidth: 2 };
        let shape;

        if (type.includes('male')) shape = new fabric.Rect({ ...style, width: 55, height: 55, fill: '#e3f2fd' });
        else if (type.includes('female')) shape = new fabric.Circle({ ...style, radius: 28, fill: '#fce4ec' });
        else if (type === 'disability') shape = new fabric.Rect({ ...style, width: 55, height: 55, fill: '#f5f5f5', strokeDashArray: [5, 5] });
        else shape = new fabric.Triangle({ ...style, width: 55, height: 55, fill: '#fff9c4' });

        let members = [shape];

        // 案主識別 (雙框線) 
        if (type.startsWith('pro_')) {
            shape.set('strokeWidth', 4);
            let outer = (type.includes('male')) ? 
                new fabric.Rect({ ...style, width: 72, height: 72, fill: 'transparent', strokeWidth: 2 }) :
                new fabric.Circle({ ...style, radius: 37, fill: 'transparent', strokeWidth: 2 });
            members.unshift(outer);
        }

        // 死亡 X 標記 
        if (type.startsWith('dead_')) {
            const l1 = new fabric.Line([-20, -20, 20, 20], { stroke: 'black', strokeWidth: 2, originX:'center', originY:'center' });
            const l2 = new fabric.Line([20, -20, -20, 20], { stroke: 'black', strokeWidth: 2, originX:'center', originY:'center' });
            members.push(l1, l2);
        }

        const text = new fabric.Text(labelText, { fontSize: 14, top: 50, originX: 'center', fontWeight: 'bold' });
        members.push(text);

        const group = new fabric.Group(members, { left: x, top: y, originX: 'center', originY: 'center' });
        group.attachedLines = [];
        canvas.add(group);
        return group;
    }

    // --- 自動連線與置中對齊核心 ---
    function createLineBetween(p1, p2, styleType) {
        const c1 = p1.getCenterPoint();
        const c2 = p2.getCenterPoint();
        const line = new fabric.Line([c1.x, c1.y, c2.x, c2.y], { 
            stroke: 'black', strokeWidth: 2, selectable: true 
        });

        // 根據文件設定線條樣式 
        if (styleType === 'cohabit') line.set('strokeDashArray', [5, 5]);
        if (styleType === 'divorce') line.set({ stroke: '#e74c3c', strokeWidth: 4 });
        if (styleType === 'conflict') line.set({ stroke: '#f1c40f', strokeDashArray: [2, 2], strokeWidth: 3 });
        if (styleType === 'close') line.set({ stroke: '#3498db', strokeWidth: 7 });

        line.nodeA = p1; line.nodeB = p2;
        p1.attachedLines.push(line); p2.attachedLines.push(line);
        canvas.add(line);
        canvas.sendToBack(line);
    }

    // 物件移動時，線條自動置中重新計算
    canvas.on('object:moving', (e) => {
        const p = e.target;
        if (p.attachedLines) {
            p.attachedLines.forEach(l => {
                const centerA = l.nodeA.getCenterPoint();
                const centerB = l.nodeB.getCenterPoint();
                l.set({ x1: centerA.x, y1: centerA.y, x2: centerB.x, y2: centerB.y });
            });
        }
        updateMenuPos();
    });

    // --- 輔助 UI 邏輯 ---
    function addNode(type) { createNode(type, document.getElementById('nodeLabel').value || "成員", 200, 200); }
    function manualLink(s) { const sel = canvas.getActiveObjects(); if (sel.length === 2) createLineBetween(sel[0], sel[1], s); }
    function quickAdd(dir) {
        if (!selectedMember) return;
        let nX = selectedMember.left, nY = selectedMember.top;
        if (dir === 'up') nY -= 130; if (dir === 'down') nY += 130;
        if (dir === 'left') nX -= 130; if (dir === 'right') nX += 130;
        const newNode = createNode(dir === 'left' ? 'female' : 'male', "新成員", nX, nY);
        createLineBetween(selectedMember, newNode, 'normal');
    }
    canvas.on('selection:created', (e) => { if(e.target.type === 'group') { selectedMember = e.target; updateMenuPos(); document.getElementById('quick-menu').style.display='block'; }});
    canvas.on('selection:cleared', () => { document.getElementById('quick-menu').style.display='none'; selectedMember=null; });
    function updateMenuPos() { if(selectedMember) { const b = selectedMember.getBoundingRect(); const m = document.getElementById('quick-menu'); m.style.left=b.left+'px'; m.style.top=b.top+'px'; m.style.width=b.width+'px'; m.style.height=b.height+'px'; }}
    function exportToJPG() { html2canvas(document.getElementById('canvas-holder')).then(c => { const a = document.createElement('a'); a.href = c.toDataURL('image/jpeg', 0.9); a.download = 'genogram_pro.jpg'; a.click(); }); }
    document.addEventListener('keydown', (e) => { if (e.key === 'Delete') { canvas.getActiveObjects().forEach(o => { if(o.attachedLines) o.attachedLines.forEach(l => canvas.remove(l)); canvas.remove(o); }); canvas.discardActiveObject().renderAll(); }});
</script>
</body>
</html>
