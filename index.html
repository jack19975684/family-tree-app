<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>專業家系圖系統 - 動態關係版</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { --primary: #2c3e50; --bg: #f4f7f6; }
        body { font-family: "Microsoft JhengHei", sans-serif; display: flex; height: 100vh; margin: 0; background: var(--bg); overflow: hidden; }
        .sidebar { width: 280px; background: white; border-right: 1px solid #ddd; display: flex; flex-direction: column; overflow-y: auto; z-index: 10; }
        .sidebar-header { padding: 20px; background: var(--primary); color: white; font-weight: bold; text-align: center; }
        .section { padding: 15px; border-bottom: 1px solid #eee; }
        .section-title { font-size: 14px; color: #666; margin-bottom: 10px; font-weight: bold; display: block; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        button { padding: 10px; cursor: pointer; border: 1px solid #ddd; border-radius: 4px; background: white; font-size: 13px; }
        button:hover { background: #f8f9fa; border-color: #bbb; }
        .btn-main { background: #28a745; color: white; border: none; grid-column: span 2; margin-top: 10px; font-weight: bold; }
        .main-content { flex: 1; position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; background-image: radial-gradient(#d1d1d1 1px, transparent 1px); background-size: 20px 20px; }
        #canvas-container { background: white; box-shadow: 0 0 20px rgba(0,0,0,0.1); border: 1px solid #ccc; }
        .status-bar { position: absolute; bottom: 10px; left: 300px; font-size: 12px; color: #777; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-header">家系圖工具箱</div>
        
        <div class="section">
            <span class="section-title">1. 成員基本資料 </span>
            <input type="text" id="nodeName" placeholder="輸入姓名或歲數" style="width: 100%; padding: 8px; margin-bottom: 8px; box-sizing: border-box; border: 1px solid #ccc;">
            <div class="grid">
                <button onclick="addMember('male')">□ 男 (案男)</button>
                <button onclick="addMember('female')">○ 女 (案女)</button>
                <button onclick="addMember('disability')">▩ 身障/病</button>
                <button onclick="addMember('unknown')">△ 不確定</button>
            </div>
        </div>

        <div class="section">
            <span class="section-title">2. 設定關係線 </span>
            <div class="grid">
                <button onclick="addLine('normal')">── 連結/婚姻</button>
                <button onclick="addLine('cohabit')">╌╌ 同居</button>
                <button onclick="addLine('divorce')">─/─ 離婚</button>
                <button onclick="addLine('separate')">─//─ 分居</button>
            </div>
        </div>

        <div class="section">
            <span class="section-title">3. 心理/互動關係 </span>
            <div class="grid" style="grid-template-columns: 1fr;">
                <button onclick="addLine('close')">≡≡ 正向親密/過度親密</button>
                <button onclick="addLine('conflict')">⚡ 衝突關係</button>
                <button onclick="addLine('broken')">- - 關係惡化/中斷</button>
            </div>
        </div>

        <div class="section">
            <button class="btn-main" onclick="exportJPG()">💾 導出圖片 (JPG)</button>
            <p style="font-size: 11px; color: #999; margin-top: 10px;">提示：選中物件後按 <b>Delete</b> 鍵可直接刪除。</p>
        </div>
    </div>

    <div class="main-content">
        <div id="canvas-container">
            <canvas id="familyCanvas" width="1000" height="700"></canvas>
        </div>
    </div>

    <script>
        const canvas = new fabric.Canvas('familyCanvas');

        // 監聽鍵盤 Delete 鍵
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Delete' || e.key === 'Backspace') {
                const activeObjects = canvas.getActiveObjects();
                activeObjects.forEach(obj => {
                    // 如果刪除的是人，要連帶刪除與他關聯的線
                    if (obj.lines) {
                        obj.lines.forEach(line => canvas.remove(line));
                    }
                    canvas.remove(obj);
                });
                canvas.discardActiveObject().requestRenderAll();
            }
        });

        // 新增成員
        function addMember(type) {
            const name = document.getElementById('nodeName').value || "新成員";
            let shape;
            let options = { originX: 'center', originY: 'center', fill: 'transparent', stroke: 'black', strokeWidth: 2 };

            if (type === 'male') shape = new fabric.Rect({ ...options, width: 60, height: 60 });
            else if (type === 'female') shape = new fabric.Circle({ ...options, radius: 30 });
            else if (type === 'disability') shape = new fabric.Rect({ ...options, width: 60, height: 60, strokeWidth: 4, strokeDashArray: [5, 5] });
            else shape = new fabric.Triangle({ ...options, width: 60, height: 60 });

            const text = new fabric.Text(name, { fontSize: 14, top: 45, originX: 'center' });
            const group = new fabric.Group([shape, text], { left: 400, top: 300, hasRotatingPoint: false });
            
            group.lines = []; // 用來儲存與此人相關的所有線條
            canvas.add(group);
        }

        // 建立自動跟隨的關係線
        function addLine(type) {
            const activeObjects = canvas.getActiveObjects();
            if (activeObjects.length !== 2) {
                alert("請按住 Shift 鍵選取兩個成員進行連線");
                return;
            }

            const personA = activeObjects[0];
            const personB = activeObjects[1];

            let lineOptions = {
                stroke: 'black',
                strokeWidth: 2,
                selectable: true,
                evented: true,
                // 紀錄這條線連接哪兩個人
                personA: personA,
                personB: personB
            };

            // 根據文件定義線條樣式 
            if (type === 'cohabit') lineOptions.strokeDashArray = [5, 5];
            if (type === 'divorce') { lineOptions.stroke = '#e74c3c'; lineOptions.strokeWidth = 3; }
            if (type === 'close') { lineOptions.stroke = '#3498db'; lineOptions.strokeWidth = 6; }
            if (type === 'conflict') { lineOptions.stroke = '#f39c12'; lineOptions.strokeDashArray = [2, 2]; }

            const p1 = personA.getCenterPoint();
            const p2 = personB.getCenterPoint();
            const line = new fabric.Line([p1.x, p1.y, p2.x, p2.y], lineOptions);

            // 相互關聯，以便移動時更新
            personA.lines.push(line);
            personB.lines.push(line);

            canvas.add(line);
            canvas.sendToBack(line);
            canvas.discardActiveObject().requestRenderAll();
        }

        // 核心：監聽移動事件，即時更新線條座標
        canvas.on('object:moving', function(e) {
            const p = e.target;
            if (p.lines) {
                p.lines.forEach(line => {
                    const centerA = line.personA.getCenterPoint();
                    const centerB = line.personB.getCenterPoint();
                    line.set({ x1: centerA.x, y1: centerA.y, x2: centerB.x, y2: centerB.y });
                });
            }
            canvas.renderAll();
        });

        function exportJPG() {
            html2canvas(document.getElementById('canvas-container')).then(canvasElement => {
                const link = document.createElement('a');
                link.download = 'family-tree.jpg';
                link.href = canvasElement.toDataURL('image/jpeg', 0.9);
                link.click();
            });
        }
    </script>
</body>
</html>
